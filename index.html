<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Raksha Bandhan</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle, #ff4d4d, #990000);
            font-family: 'Poppins', sans-serif;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .garland {
            position: absolute;
            top: -10px;
            width: 50px;
            height: 120%;
            background-image: url('garland_image.png');
            background-size: contain;
            background-repeat: repeat-y;
            transform-origin: top center;
            animation: swing 4s ease-in-out infinite alternate;
            z-index: 1;
        }

        .garland-left { left: 8%; }
        .garland-right { right: 8%; }

        @keyframes swing {
            0% { transform: rotate(-3deg); }
            100% { transform: rotate(3deg); }
        }

        .container {
            background-color: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(5px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 2;
            max-width: 500px;
            margin: 20px;
        }

        .rakhi-icon {
            font-size: 3rem;
            margin-bottom: 5px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 300;
            margin: 0;
            letter-spacing: 3px;
        }

        .cursive-title {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            color: #fffb00;
            margin-top: -10px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 15px rgba(255, 251, 0, 0.6);
        }

        p {
            color: #ffe6e6;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .video-container {
            margin: 20px 0;
            animation: float 3s ease-in-out infinite alternate;
        }

        .rakhi-video {
            width: 100%;
            max-width: 320px;
            border-radius: 12px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.5);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-10px); }
        }

        /* Blocked / limit-reached screen */
        .blocked-container {
            display: none;
            background-color: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(5px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 2;
            max-width: 500px;
            margin: 20px;
            color: #fff;
        }

        .blocked-container h2 {
            font-size: 1.6rem;
            margin-bottom: 10px;
        }

        .loading-text {
            color: #ffe6e6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="garland garland-left"></div>
    <div class="garland garland-right"></div>

    <div class="container" id="mainContent" style="display:none;">
        <div class="rakhi-icon">✨🪔✨</div>
        <h1>HAPPY</h1>
        <div class="cursive-title">Raksha Bandhan</div>

        <p>भाई-बहन के अटूट प्यार के पावन पर्व की हार्दिक शुभकामनाएं!</p>

        <div class="video-container">
            <video class="rakhi-video" src="rakhi_video.mp4" controls autoplay muted playsinline></video>
        </div>
    </div>

    <div class="blocked-container" id="blockedMessage">
        <div class="rakhi-icon">🚫</div>
        <h2>Limit Cross Ho Gayi</h2>
        <p>Aap is video ko allowed 5 se zyada baar dekh chuke hain.</p>
    </div>

    <p class="loading-text" id="loadingText">Loading...</p>

    <script>
        // ===== IMPORTANT: Apna Google Apps Script Web App URL yahan paste karein =====
        const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxxKcU6sca9hq1eQtcX8ygOrlIfSqTxmsD42xFAnEMHxP05ic0aVkoFWwDbkOz4_n1acg/exec";

        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        function showMain() {
            document.getElementById('loadingText').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        }

        function showBlocked() {
            document.getElementById('loadingText').style.display = 'none';
            document.getElementById('blockedMessage').style.display = 'block';
        }

        function handleViewResponse(result) {
            if (result && result.blocked) {
                showBlocked();
            } else {
                showMain();
            }
        }

        window.onload = function () {
            const id = getQueryParam('id');

            if (!id) {
                // Agar ID hi nahi hai URL mein, to seedha dikha do (testing ke liye)
                showMain();
                return;
            }

            if (WEBAPP_URL.indexOf("PASTE_YOUR") !== -1) {
                // Apps Script URL abhi set nahi hua — seedha dikha do
                showMain();
                return;
            }

            fetch(WEBAPP_URL + "?id=" + encodeURIComponent(id))
                .then(function (res) { return res.json(); })
                .then(function (result) { handleViewResponse(result); })
                .catch(function (err) {
                    console.error("View tracking failed:", err);
                    showMain();
                });
        };
    </script>

</body>
</html>
