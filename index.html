<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Raksha Bandhan</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff9933, #ffffff, #138808);
            font-family: 'Arial', sans-serif;
            text-align: center;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 3px solid #ff4500;
        }
        h1 {
            color: #d11919;
            font-size: 3rem;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        p {
            color: #333;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .rakhi-icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="rakhi-icon">✨🪔✨</div>
        <h1>HAPPY RAKSHA BANDHAN</h1>
        <p>भाई-बहन के अटूट प्यार के पावन पर्व की हार्दिक शुभकामनाएं!</p>
    </div>

</body>
</html>
